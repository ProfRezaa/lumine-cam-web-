<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root {
            --apple-font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            font-family: var(--apple-font); color: white;
        }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Layers */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        
        #gesture-text {
            font-size: 5rem; font-weight: 300; letter-spacing: -0.02em;
            opacity: 0; transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        #gesture-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }

        .instructions {
            position: absolute; bottom: 40px; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.5);
            transition: opacity 1s ease;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .loader-ring {
            width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        video { display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div style="letter-spacing: 0.3em; font-size: 0.7rem;">INITIALIZING LUMINA</div>
    </div>

    <div id="canvas-container"></div>

    <div class="overlay">
        <div id="gesture-text"></div>
        <div class="instructions" id="hint">Position hand in view</div>
    </div>

    <video id="webcam" playsinline></video>

    <script>
        /**
         * GLOBAL CONFIG & STATE
         */
        let scene, camera, renderer, composer, particles, particleSystem;
        let hands, cameraPipe;
        const pointerCoords = new THREE.Vector3(0, 0, 0);
        const lerpCoords = new THREE.Vector3(0, 0, 0);
        let currentGesture = "";
        let lastExplosionTime = 0;
        const COLORS = [0x00f2ff, 0x7000ff, 0xff00c8, 0xffd700];

        /**
         * INITIALIZATION
         */
        async function init() {
            setupScene();
            setupParticles();
            setupPostProcessing();
            setupHandTracking();
            animate();
            
            // Handle Resize
            window.addEventListener('resize', onWindowResize);
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
        }

        function setupParticles() {
            const count = 2500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randomness = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 15;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 15;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
                sizes[i] = Math.random();
                randomness[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.ShaderMaterial({
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                uniforms: {
                    uTime: { value: 0 },
                    uPointer: { value: new THREE.Vector3() },
                    uColor: { value: new THREE.Color(0x4444ff) }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform vec3 uPointer;
                    attribute float size;
                    varying float vOpacity;
                    void main() {
                        vec3 pos = position;
                        float dist = distance(pos, uPointer);
                        if(dist < 2.5) {
                            pos = mix(pos, uPointer, (1.0 - dist/2.5) * 0.15);
                        }
                        pos.y += sin(uTime * 0.5 + position.x) * 0.1;
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * (30.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                        vOpacity = size;
                    }
                `,
                fragmentShader: `
                    varying float vOpacity;
                    void main() {
                        float d = distance(gl_PointCoord, vec2(0.5));
                        if(d > 0.5) discard;
                        gl_FragColor = vec4(1.0, 1.0, 1.0, (1.0 - d * 2.0) * 0.5 * vOpacity);
                    }
                `
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            particles = geometry.attributes.position;
        }

        function setupPostProcessing() {
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.5;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        /**
         * HAND TRACKING LOGIC
         */
        function setupHandTracking() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults(onHandResults);

            const videoElement = document.getElementById('webcam');
            cameraPipe = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraPipe.start().then(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').remove(), 1500);
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Track Palm position for particle magnet
                const palm = landmarks[9]; // Middle finger MCP
                pointerCoords.set(
                    (0.5 - palm.x) * 12,
                    (0.5 - palm.y) * 8,
                    0
                );

                // Gesture Detection
                detectGesture(landmarks);
                document.getElementById('hint').style.opacity = '0';
            } else {
                updateUI("");
                document.getElementById('hint').style.opacity = '1';
            }
        }

        function detectGesture(lm) {
            const fingers = [];
            // Tips: 8, 12, 16, 20. Joints: 6, 10, 14, 18
            [8, 12, 16, 20].forEach((tip, i) => {
                fingers.push(lm[tip].y < lm[tip - 2].y);
            });
            // Thumb
            const thumb = lm[4].x < lm[3].x; // Simple check for right hand
            
            const count = fingers.filter(Boolean).length + (thumb ? 1 : 0);

            // ILY: Thumb + Index + Pinky
            const isILY = thumb && fingers[0] && !fingers[1] && !fingers[2] && fingers[3];

            if (count === 5) {
                triggerFirework();
                updateUI("FESTIVAL");
            } else if (isILY) {
                updateUI("i love you");
            } else if (count === 1) {
                updateUI("halo sayang");
            } else if (count === 2) {
                updateUI("love");
            } else {
                updateUI("");
            }
        }

        /**
         * EFFECTS & ANIMATION
         */
        function triggerFirework() {
            const now = Date.now();
            if (now - lastExplosionTime < 1000) return;
            lastExplosionTime = now;

            // Subtle Camera Shake
            const tl = { z: camera.position.z };
            camera.position.x += (Math.random() - 0.5) * 0.2;
            setTimeout(() => camera.position.x = 0, 100);

            // Spawn explosive particles
            const fireworkCount = 100;
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            for(let i = 0; i < fireworkCount; i++) {
                createFireworkParticle(pointerCoords, color);
            }
        }

        function createFireworkParticle(origin, colorHex) {
            const geom = new THREE.SphereGeometry(0.02, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true });
            const mesh = new THREE.Mesh(geom, mat);
            
            mesh.position.copy(origin);
            scene.add(mesh);

            const vel = new THREE.Vector3(
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5
            );

            let life = 1.0;
            function updateP() {
                if (life <= 0) {
                    scene.remove(mesh);
                    return;
                }
                mesh.position.add(vel);
                vel.y -= 0.005; // gravity
                life -= 0.015;
                mat.opacity = life;
                mesh.scale.setScalar(life);
                requestAnimationFrame(updateP);
            }
            updateP();
        }

        function updateUI(text) {
            const el = document.getElementById('gesture-text');
            if (currentGesture !== text) {
                currentGesture = text;
                if (text === "") {
                    el.classList.remove('active');
                } else {
                    el.innerText = text;
                    el.classList.add('active');
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            // Smoothly move the pointer attracter
            lerpCoords.lerp(pointerCoords, 0.1);
            particleSystem.material.uniforms.uPointer.value.copy(lerpCoords);
            particleSystem.material.uniforms.uTime.value = time;

            // Ambient rotation
            particleSystem.rotation.y = Math.sin(time * 0.2) * 0.1;
            particleSystem.rotation.x = Math.cos(time * 0.2) * 0.1;

            composer.render();
        }

        // Start App
        init();
    </script>
</body>
</html>
