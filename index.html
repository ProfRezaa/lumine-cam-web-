<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Reza | Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; color: white; }
        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        #gesture-text { font-size: 3.5rem; font-weight: 300; opacity: 0; transform: translateY(20px); transition: all 0.4s ease; text-shadow: 0 0 20px #0ff; text-align: center; }
        #gesture-text.active { opacity: 1; transform: translateY(0); }
        video { display: block; position: absolute; top: 20px; left: 50%; transform: translateX(-50%) scaleX(-1); width: 160px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); z-index: 100; opacity: 0.5; }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader { width: 30px; height: 30px; border: 2px solid #333; border-top: 2px solid #0ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div style="letter-spacing: 0.2em; font-size: 0.7rem; color: #0ff;">MEMUAT HOLOGRAM REZA...</div>
    </div>

    <video id="webcam" playsinline></video>
    <div id="canvas-container"></div>
    <div class="overlay"><div id="gesture-text"></div></div>

    <script>
        let scene, camera, renderer, handPoints;
        const PARTICLE_COUNT = 1000;
        let lastText = "";

        // 1. Setup 3D
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.z = 4;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
            handPoints = new THREE.Points(geo, mat);
            scene.add(handPoints);
            animate();
        }

        // 2. Setup AI Kamera
        async function startApp() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(onResults);

            const videoElement = document.getElementById('webcam');
            const cameraProc = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });

            cameraProc.start().then(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').remove(), 500);
            });
        }

        function onResults(res) {
            const posAttr = handPoints.geometry.attributes.position;
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const lm = res.multiHandLandmarks[0];
                let idx = 0;
                
                // Gambar Kerangka
                const pairs = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
                pairs.forEach(p => {
                    const s = lm[p[0]], e = lm[p[1]];
                    for(let i=0; i<40; i++) {
                        const t = i/40;
                        posAttr.array[idx++] = (0.5 - (s.x + (e.x-s.x)*t)) * 4;
                        posAttr.array[idx++] = (0.5 - (s.y + (e.y-s.y)*t)) * 3;
                        posAttr.array[idx++] = -(s.z + (e.z-s.z)*t) * 2;
                    }
                });
                
                // Deteksi Jari
                const fUp = [lm[8].y<lm[6].y, lm[12].y<lm[10].y, lm[16].y<lm[14].y, lm[20].y<lm[18].y];
                const thumb = Math.abs(lm[4].x - lm[2].x) > 0.1;
                const count = fUp.filter(Boolean).length + (thumb ? 1 : 0);

                if(count === 5) { show("🎆 PETASAN! 🎆", 0xff00ff); }
                else if(count === 4) { show("senang bertemu denganmu", 0x00ff00); }
                else if(count === 3) { show("aku reza", 0xffff00); }
                else if(count === 2) { show("perkenalkan", 0x00ffff); }
                else if(count === 1) { show("hai", 0xffffff); }
                else { show(""); }
            } else {
                for(let i=0; i<posAttr.array.length; i++) posAttr.array[i] = -100;
                show("");
            }
            posAttr.needsUpdate = true;
        }

        function show(t, c) {
            const el = document.getElementById('gesture-text');
            if(lastText !== t) {
                lastText = t; el.innerText = t;
                t === "" ? el.classList.remove('active') : el.classList.add('active');
                if(c) { handPoints.material.color.setHex(c); el.style.textShadow = `0 0 20px ${new THREE.Color(c).getStyle()}`; }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
        startApp();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
