<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Partikel Reza | Hologram Hand</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; color: white; }
        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        
        #gesture-text { 
            font-size: 3rem; 
            font-weight: 300; 
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 0.4s ease; 
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.7); /* Cyan glow default */
            text-align: center;
        }
        #gesture-text.active { opacity: 1; transform: translateY(0); }

        /* Kamera Samar di Atas Tengah */
        video { 
            display: block; 
            position: absolute; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%) scaleX(-1); /* Tengah & Mirror */
            width: 160px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            opacity: 0.3; /* Samar */
            transition: opacity 0.3s;
        }
        video:hover { opacity: 1; } /* Muncul saat di-hover mouse */

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(0,255,255,0.1); border-top: 3px solid #0ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div style="letter-spacing: 0.2em; font-size: 0.8rem; color: #0ff;">MEMPROSES JARINGAN AURA...</div>
    </div>

    <video id="webcam" playsinline></video>
    <div id="canvas-container"></div>
    <div class="overlay"><div id="gesture-text"></div></div>

    <script>
        let scene, camera, renderer, auraParticles;
        const NUM_PARTICLES = 3000; // Jumlah total partikel (banyak agar terlihat padat)
        let lastText = "";
        let currentGlowColor = 0x00ffff; // Cyan default

        // 1. Setup 3D Scene
        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Tambahkan additive blending untuk efek cahaya premium
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // BUAT PARTIKEL AURA
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(NUM_PARTICLES * 3);
            const sizes = new Float32Array(NUM_PARTICLES); // Ukuran acak

            for(let i=0; i<NUM_PARTICLES; i++) {
                positions[i*3] = -100; // Mulai jauh dari layar
                positions[i*3+1] = -100;
                positions[i*3+2] = -100;
                sizes[i] = Math.random() * 0.02 + 0.005; // Ukuran bervariasi
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            // Material partikel: Bercahaya, Additive Blending
            const mat = new THREE.PointsMaterial({ 
                color: currentGlowColor, 
                size: 0.015, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending, // Membuat partikel tumpuk jadi lebih terang
                depthWrite: false
            });
            auraParticles = new THREE.Points(geo, mat);
            scene.add(auraParticles);
        }

        // 2. Setup Hand Tracking
        async function setupHands() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.7, // Ditingkatkan agar bentuk lebih stabil
                minTrackingConfidence: 0.7 
            });
            hands.onResults(onResults);

            const videoElement = document.getElementById('webcam');
            const cameraHelper = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });

            cameraHelper.start().then(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').remove(), 1000);
            });
        }

        function onResults(results) {
            const posAttr = auraParticles.geometry.attributes.position;
            const videoWidth = results.image ? results.image.width : 640;
            const videoHeight = results.image ? results.image.height : 480;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                updateAuraParticles(lm, videoWidth, videoHeight);
                detectGesture(lm);
            } else {
                // Sembunyikan partikel jika tidak ada tangan
                for(let i=0; i<NUM_PARTICLES * 3; i++) {
                    posAttr.array[i] = -100; // Lempar jauh dari layar
                }
                updateText("");
                changeColor(0x00ffff); // Kembali ke Cyan
            }
            posAttr.needsUpdate = true;
        }

        // LOGIKA UTAMA: MEMBUAT PARTIKEL ACAK DI SEKITAR BENTUK TANGAN
        function updateAuraParticles(landmarks, w, h) {
            const positions = auraParticles.geometry.attributes.position.array;
            
            // Sendi-sendi utama untuk diikuti aura
            const keyPoints = [0, 4, 8, 12, 16, 20]; // Pergelangan dan ujung-ujung jari
            const perPoint = Math.floor(NUM_PARTICLES / keyPoints.length);

            let pIdx = 0;
            keyPoints.forEach(kpId => {
                const kp = landmarks[kpId];
                
                // Konversi koordinat MediaPipe (0-1) ke Three.js (dunia 3D)
                const basePos = new THREE.Vector3((0.5 - kp.x) * 4, (0.5 - kp.y) * 3, -kp.z * 2);

                // Buat titik-titik acak di sekitar basePos (aura)
                for(let i=0; i<perPoint; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 0.15; // Jari-jari aura

                    positions[pIdx++] = basePos.x + Math.cos(angle) * radius;
                    positions[pIdx++] = basePos.y + Math.sin(angle) * radius;
                    positions[pIdx++] = basePos.z + (Math.random() - 0.5) * 0.1; // Variasi kedalaman
                }
            });

            // Sisa partikel diisi dengan titik acak di sekitar telapak tangan (Palm)
            const palmLMs = [0, 1, 5, 9, 13, 17, 0]; // Bentuk telapak
            while(pIdx < NUM_PARTICLES * 3) {
                const id1 = palmLMs[Math.floor(Math.random() * palmLMs.length)];
                const id2 = palmLMs[Math.floor(Math.random() * palmLMs.length)];
                
                const lm1 = landmarks[id1];
                const lm2 = landmarks[id2];

                // Interpolasi acak di antara dua titik telapak
                const t = Math.random();
                const interLM = {
                    x: lm1.x + (lm2.x - lm1.x) * t,
                    y: lm1.y + (lm2.y - lm1.y) * t,
                    z: lm1.z + (lm2.z - lm1.z) * t
                };

                const basePos = new THREE.Vector3((0.5 - interLM.x) * 4, (0.5 - interLM.y) * 3, -interLM.z * 2);

                positions[pIdx++] = basePos.x + (Math.random() - 0.5) * 0.2; // Sedikit acak horizontal
                positions[pIdx++] = basePos.y + (Math.random() - 0.5) * 0.2; // Sedikit acak vertikal
                positions[pIdx++] = basePos.z + (Math.random() - 0.5) * 0.1; // Variasi kedalaman
            }
        }

        function detectGesture(lm) {
            const isFingerUp = [
                lm[8].y < lm[6].y,  
                lm[12].y < lm[10].y, 
                lm[16].y < lm[14].y, 
                lm[20].y < lm[18].y  
            ];
            const thumbUp = Math.abs(lm[4].x - lm[2].x) > 0.1;
            const count = isFingerUp.filter(Boolean).length + (thumbUp ? 1 : 0);

            if (count === 5) {
                updateText("🎆 HOLOGRAPHIC AURA FIREWORKS! 🎆");
                changeColor(0xff00ff); // Magenta
            } else if (count === 4) {
                updateText("senang bertemu denganmu");
                changeColor(0x00ff00); // Hijau
            } else if (count === 3) {
                updateText("aku reza");
                changeColor(0xffff00); // Kuning
            } else if (count === 2) {
                updateText("perkenalkan");
                changeColor(0x00ffff); // Cyan
            } else if (count === 1) {
                updateText("hai");
                changeColor(0xffffff); // Putih
            } else {
                updateText("");
                changeColor(0x00ffff); // Kembali ke Cyan
            }
        }

        function updateText(txt) {
            const el = document.getElementById('gesture-text');
            if(lastText !== txt) {
                lastText = txt;
                el.innerText = txt;
                txt === "" ? el.classList.remove('active') : el.classList.add('active');
            }
        }

        function changeColor(colorHex) {
            if(auraParticles.material.color.getHex() !== colorHex) {
                auraParticles.material.color.setHex(colorHex);
                // Ubah glow text juga agar serasi
                const rgb = new THREE.Color(colorHex);
                document.getElementById('gesture-text').style.textShadow = `0 0 25px rgba(${rgb.r*255}, ${rgb.g*255}, ${rgb.b*255}, 0.7)`;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(auraParticles) {
                // Berikan rotasi lambat untuk efek 3D
                auraParticles.rotation.y += 0.001;
            }
            renderer.render(scene, camera);
        }

        initScene();
        setupHands();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
