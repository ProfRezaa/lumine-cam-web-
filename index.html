<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AR | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root {
            --apple-font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--apple-font);
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Video Feed di Tengah */
        #video-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 240px;
            z-index: 5;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
            opacity: 0.6; /* Transparan agar menyatu */
            filter: grayscale(0.5) contrast(1.2);
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            pointer-events: none;
            padding-top: 10vh;
        }

        #gesture-text {
            font-size: 4rem;
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
            background: linear-gradient(to bottom, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #gesture-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader-ring {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="loader-ring"></div></div>

    <div id="canvas-container"></div>

    <div id="video-wrapper">
        <video id="videoElement" autoplay playsinline></video>
    </div>

    <div id="ui-layer">
        <h1 id="gesture-text"></h1>
        <div class="instruction">Gerakkan tangan Anda di depan kamera</div>
    </div>

    <script>
        const CONFIG = {
            particleCount: 1200,
            colors: [0x00d4ff, 0x9d00ff, 0xff00c8, 0xffd700],
            lerpFactor: 0.1,
        };

        let scene, camera, renderer, composer, particleSystem;
        let handPoints = [];
        let fireworks = [];
        let video, hands;
        let currentText = "";

        const textEl = document.getElementById('gesture-text');

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Bloom Effect
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.1
            );
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Background Dust
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.particleCount * 3);
            for(let i=0; i<CONFIG.particleCount*3; i++) pos[i] = (Math.random()-0.5)*15;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particleSystem = new THREE.Points(geo, new THREE.PointsMaterial({color: 0x444444, size: 0.02}));
            scene.add(particleSystem);

            // Visual markers for fingers
            for(let i=0; i<5; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05, 12, 12),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
                );
                p.visible = false;
                scene.add(p);
                handPoints.push(p);
            }
        }

        function createExplosion(x, y, z) {
            const count = 100;
            const pts = new Float32Array(count * 3);
            const vels = [];
            const color = CONFIG.colors[Math.floor(Math.random()*CONFIG.colors.length)];

            for(let i=0; i<count; i++) {
                vels.push(new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2));
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
            const points = new THREE.Points(geo, mat);
            points.position.set(x, y, z);
            scene.add(points);
            fireworks.push({ points, vels, life: 1.0 });
        }

        function updateLogic(landmarks) {
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringUp = landmarks[16].y < landmarks[14].y;
            const pinkyUp = landmarks[20].y < landmarks[18].y;
            const thumbUp = landmarks[4].x > landmarks[3].x;

            const count = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;
            
            let text = "";
            if (indexUp && pinkyUp && !middleUp && !ringUp) text = "i love you";
            else if (count === 4) {
                if(Math.random() > 0.8) createExplosion(handPoints[0].position.x, handPoints[0].position.y, 0);
            }
            else if (count === 1) text = "halo sayang";
            else if (count === 2) text = "apa kabarr?";

            if(currentText !== text) {
                currentText = text;
                textEl.innerText = text;
                text ? textEl.classList.add('active') : textEl.classList.remove('active');
            }

            // Update markers
            [8, 12, 16, 20, 4].forEach((idx, i) => {
                const lm = landmarks[idx];
                handPoints[i].visible = true;
                handPoints[i].position.lerp(new THREE.Vector3((lm.x-0.5)*-10, (lm.y-0.5)*-8, 0), 0.2);
            });
        }

        async function start() {
            video = document.getElementById('videoElement');
            hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.7});
            
            hands.onResults(res => {
                if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    updateLogic(res.multiHandLandmarks[0]);
                } else {
                    handPoints.forEach(p => p.visible = false);
                    if(currentText !== "") { currentText = ""; textEl.classList.remove('active'); }
                }
            });

            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });

            cam.start().then(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.y += 0.001;
            
            for(let i=fireworks.length-1; i>=0; i--) {
                const f = fireworks[i];
                const pos = f.points.geometry.attributes.position.array;
                for(let j=0; j<100; j++) {
                    pos[j*3] += f.vels[j].x;
                    pos[j*3+1] += f.vels[j].y;
                    pos[j*3+2] += f.vels[j].z;
                }
                f.points.geometry.attributes.position.needsUpdate = true;
                f.life -= 0.02;
                f.points.material.opacity = f.life;
                if(f.life <= 0) { scene.remove(f.points); fireworks.splice(i, 1); }
            }
            composer.render();
        }

        initThree();
        animate();
        start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
