<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Interactive Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/shaders/LuminosityHighPassShader.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root {
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            --accent: #0071e3;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--apple-font);
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #status-text {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(10px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        #status-text.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0);
        }

        #instructions {
            position: absolute;
            bottom: 50px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            transition: opacity 1s ease;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .loader-circle {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        video {
            display: none;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <video id="input_video"></video>
    
    <div id="loading-overlay">
        <div class="loader-circle"></div>
        <p style="letter-spacing: 0.2em; font-size: 0.7rem;">INITIALIZING SENSORS</p>
    </div>

    <div id="ui-layer">
        <h1 id="status-text"></h1>
        <p id="instructions">Show your hand gesture to interact</p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');
        let currentGesture = "";
        let gestureTimeout;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING ---
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.21;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.55;

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- PARTICLES ---
        const PARTICLE_COUNT = 1500;
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);
        const velocities = [];

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            
            const color = new THREE.Color();
            color.setHSL(0.6, 0.8, 0.5);
            color.toArray(colors, i * 3);
            
            sizes[i] = Math.random() * 2;
            velocities.push(new THREE.Vector3(
                (Math.random() - 0.5) * 0.01,
                (Math.random() - 0.5) * 0.01,
                (Math.random() - 0.5) * 0.01
            ));
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        camera.position.z = 5;

        // --- HAND TRACKING LOGIC ---
        let handX = 0, handY = 0, lerpHandX = 0, lerpHandY = 0;
        let isHandVisible = false;

        function updateText(msg) {
            if (currentGesture === msg) return;
            currentGesture = msg;
            statusText.classList.remove('active');
            
            setTimeout(() => {
                statusText.innerText = msg;
                if (msg !== "") statusText.classList.add('active');
            }, 300);
        }

        function createFirework(x, y) {
            const fwCount = 100;
            const fwPositions = new Float32Array(fwCount * 3);
            const fwColors = new Float32Array(fwCount * 3);
            const fwVelocities = [];
            
            const colorPalette = [0x0071e3, 0xbf5af2, 0xff375f, 0xffd60a];
            const randCol = new THREE.Color(colorPalette[Math.floor(Math.random() * colorPalette.length)]);

            for (let i = 0; i < fwCount; i++) {
                fwPositions[i * 3] = x;
                fwPositions[i * 3 + 1] = y;
                fwPositions[i * 3 + 2] = 0;
                
                const angle = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = 0.05 + Math.random() * 0.15;
                
                fwVelocities.push(new THREE.Vector3(
                    Math.sin(phi) * Math.cos(angle) * speed,
                    Math.sin(phi) * Math.sin(angle) * speed,
                    Math.cos(phi) * speed
                ));
                
                randCol.toArray(fwColors, i * 3);
            }

            const fwGeo = new THREE.BufferGeometry();
            fwGeo.setAttribute('position', new THREE.BufferAttribute(fwPositions, 3));
            fwGeo.setAttribute('color', new THREE.BufferAttribute(fwColors, 3));
            
            const fwMat = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const fwSystem = new THREE.Points(fwGeo, fwMat);
            scene.add(fwSystem);

            // Animate Firework
            let lifetime = 1.0;
            function animateFw() {
                if (lifetime <= 0) {
                    scene.remove(fwSystem);
                    fwGeo.dispose();
                    fwMat.dispose();
                    return;
                }
                lifetime -= 0.015;
                fwMat.opacity = lifetime;
                const pos = fwGeo.attributes.position.array;
                for (let i = 0; i < fwCount; i++) {
                    pos[i * 3] += fwVelocities[i].x;
                    pos[i * 3 + 1] += fwVelocities[i].y;
                    pos[i * 3 + 2] += fwVelocities[i].z;
                    fwVelocities[i].y -= 0.002; // gravity
                }
                fwGeo.attributes.position.needsUpdate = true;
                requestAnimationFrame(animateFw);
            }
            animateFw();
            
            // Subtle Camera Shake
            camera.position.x += (Math.random() - 0.5) * 0.1;
            camera.position.y += (Math.random() - 0.5) * 0.1;
        }

        const onResults = (results) => {
            if (loadingOverlay.style.opacity !== "0") {
                loadingOverlay.style.opacity = "0";
                setTimeout(() => loadingOverlay.style.display = "none", 1500);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandVisible = true;
                const hand = results.multiHandLandmarks[0];
                
                // Centroid for movement
                handX = (hand[9].x - 0.5) * 10;
                handY = -(hand[9].y - 0.5) * 10;

                // Gesture Logic
                const fingersUp = [
                    hand[8].y < hand[6].y,  // Index
                    hand[12].y < hand[10].y, // Middle
                    hand[16].y < hand[14].y, // Ring
                    hand[20].y < hand[18].y, // Pinky
                    hand[4].x < hand[3].x    // Thumb (simplified)
                ];

                const upCount = fingersUp.filter(Boolean).length;
                
                // Recognition
                if (upCount === 5) {
                    if (currentGesture !== "firework") {
                        createFirework(handX, handY);
                        updateText("");
                        currentGesture = "firework";
                        setTimeout(() => currentGesture = "", 1000);
                    }
                } else if (fingersUp[0] && fingersUp[3] && fingersUp[4] && !fingersUp[1] && !fingersUp[2]) {
                    updateText("i love you");
                } else if (upCount === 2) {
                    updateText("apa kabar");
                } else if (upCount === 1) {
                    updateText("halo sayang");
                } else {
                    updateText("");
                }
            } else {
                isHandVisible = false;
                updateText("");
            }
        };

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => await hands.send({ image: videoElement }),
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // Smooth hand lerp
            lerpHandX += (handX - lerpHandX) * 0.1;
            lerpHandY += (handY - lerpHandY) * 0.1;

            const posArr = particleSystem.geometry.attributes.position.array;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                
                // Idle movement
                posArr[ix] += velocities[i].x;
                posArr[ix + 1] += velocities[i].y;
                posArr[ix + 2] += velocities[i].z;

                // Attraction to hand
                if (isHandVisible) {
                    const dx = lerpHandX - posArr[ix];
                    const dy = lerpHandY - posArr[ix + 1];
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 3) {
                        posArr[ix] += dx * 0.02;
                        posArr[ix + 1] += dy * 0.02;
                    }
                }

                // Bounds check
                if (Math.abs(posArr[ix]) > 6) posArr[ix] *= -0.9;
                if (Math.abs(posArr[ix+1]) > 6) posArr[ix+1] *= -0.9;
                if (Math.abs(posArr[ix+2]) > 6) posArr[ix+2] *= -0.9;
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Subtle camera movement
            camera.position.x += (lerpHandX * 0.05 - camera.position.x) * 0.05;
            camera.position.y += (lerpHandY * 0.05 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
