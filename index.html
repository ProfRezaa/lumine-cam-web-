<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gesture Experience</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: radial-gradient(circle at 50% 50%, #0a0a0f, #000);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: white;
}

canvas { display: block; }

#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  font-size: 48px;
  opacity: 0;
  text-align: center;
  transition: all 0.8s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}

#overlay.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

#instruction {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  opacity: 0.6;
  font-size: 16px;
}

#loading {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:10;
  transition: opacity 1s ease;
}
</style>
</head>

<body>

<div id="loading">Loading experience...</div>
<div id="overlay"></div>
<div id="instruction">Show your hand gesture</div>
<video id="video" autoplay playsinline style="display:none;"></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene, camera, renderer, composer;
let particles, particlePositions;
let handData = null;
let fireworks = [];
let overlay = document.getElementById("overlay");

initThree();
initHandTracking();

function initThree(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  composer.addPass(new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.5, 0.4, 0.85
  ));

  createParticles();
  animate();
}

function createParticles(){
  const count = 500;
  const geo = new THREE.BufferGeometry();
  particlePositions = new Float32Array(count * 3);

  for(let i=0;i<count;i++){
    particlePositions[i*3] = (Math.random()-0.5)*5;
    particlePositions[i*3+1] = (Math.random()-0.5)*5;
    particlePositions[i*3+2] = (Math.random()-0.5)*5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(particlePositions,3));

  const mat = new THREE.PointsMaterial({
    size: 0.05,
    color: 0xffffff,
    blending: THREE.AdditiveBlending,
    transparent:true
  });

  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

function animate(){
  requestAnimationFrame(animate);

  updateParticles();
  updateFireworks();

  composer.render();
}

function updateParticles(){
  if(handData){
    const palm = handData[0];
    for(let i=0;i<particlePositions.length;i+=3){
      particlePositions[i] += (palm.x*5 - particlePositions[i]) * 0.05;
      particlePositions[i+1] += (-palm.y*5 - particlePositions[i+1]) * 0.05;
    }
    particles.geometry.attributes.position.needsUpdate = true;
  }
}

function createFirework(){
  const group = new THREE.Group();
  const particles = [];

  for(let i=0;i<200;i++){
    const geo = new THREE.SphereGeometry(0.02);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(Math.random(),1,0.6)
    });
    const mesh = new THREE.Mesh(geo, mat);

    mesh.velocity = new THREE.Vector3(
      (Math.random()-0.5)*0.2,
      (Math.random()-0.5)*0.2,
      (Math.random()-0.5)*0.2
    );

    group.add(mesh);
    particles.push(mesh);
  }

  scene.add(group);
  fireworks.push({group, particles, life:1});
}

function updateFireworks(){
  fireworks.forEach(fw=>{
    fw.life -= 0.01;
    fw.particles.forEach(p=>{
      p.position.add(p.velocity);
      p.velocity.y -= 0.002;
      p.material.opacity = fw.life;
    });
  });

  fireworks = fireworks.filter(fw=>{
    if(fw.life <=0){
      scene.remove(fw.group);
      return false;
    }
    return true;
  });
}

function showText(text){
  overlay.innerText = text;
  overlay.classList.add("show");
  setTimeout(()=>overlay.classList.remove("show"),2000);
}

function detectGesture(landmarks){
  let fingers = 0;

  if(landmarks[8].y < landmarks[6].y) fingers++;
  if(landmarks[12].y < landmarks[10].y) fingers++;
  if(landmarks[16].y < landmarks[14].y) fingers++;
  if(landmarks[20].y < landmarks[18].y) fingers++;

  let thumb = landmarks[4].x < landmarks[3].x;

  if(thumb) fingers++;

  if(fingers === 1) showText("halo sayang");
  if(fingers === 2) showText("apa kabar");
  if(fingers === 5){
    showText("🔥");
    createFirework();
  }

  if(thumb && landmarks[8].y < landmarks[6].y && landmarks[20].y < landmarks[18].y){
    showText("i love you");
  }
}

function initHandTracking(){
  const video = document.getElementById("video");

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults(results=>{
    if(results.multiHandLandmarks.length){
      const lm = results.multiHandLandmarks[0];
      handData = lm;
      detectGesture(lm);
    }
  });

  const cam = new Camera(video,{
    onFrame: async ()=>{
      await hands.send({image:video});
    },
    width:640,
    height:480
  });

  cam.start();

  setTimeout(()=>{
    document.getElementById("loading").style.opacity = 0;
  },1500);
}

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
