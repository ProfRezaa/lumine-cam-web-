<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root {
            --apple-font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --accent: #a855f7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: var(--apple-font);
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            text-align: center;
        }

        #gesture-text {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            filter: blur(5px);
        }

        #gesture-text.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader-ring {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        video {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading"><div class="loader-ring"></div></div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h1 id="gesture-text"></h1>
        <div class="instruction">Position your hand to begin</div>
    </div>

    <video id="videoElement"></video>

    <script>
        /** * GLOBAL CONFIG 
         */
        const CONFIG = {
            particleCount: 1500,
            fireworkCount: 300,
            colors: [0x00d4ff, 0x9d00ff, 0xff00c8, 0xffd700],
            lerpFactor: 0.15,
            bloomParams: {
                exposure: 1,
                bloomStrength: 1.5,
                bloomThreshold: 0.1,
                bloomRadius: 0.4
            }
        };

        let scene, camera, renderer, composer, particles, particleSystem;
        let handParticles = [];
        let fireworks = [];
        let video, hands;
        let currentText = "";
        let isExploding = false;

        const textEl = document.getElementById('gesture-text');
        const loadingEl = document.getElementById('loading');

        /**
         * THREE.JS INITIALIZATION
         */
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Post Processing
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                CONFIG.bloomParams.bloomStrength,
                CONFIG.bloomParams.bloomRadius,
                CONFIG.bloomParams.bloomThreshold
            );

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Background Ambient Particles
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.particleCount * 3);
            for (let i = 0; i < CONFIG.particleCount * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 20;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.02,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geo, mat);
            scene.add(particleSystem);

            // Hand Tracking Particles (Fingertips)
            for(let i=0; i<21; i++) {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 })
                );
                sphere.visible = false;
                scene.add(sphere);
                handParticles.push(sphere);
            }
        }

        /**
         * GESTURE RECOGNITION LOGIC
         */
        function processGestures(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];
            const wrist = landmarks[0];

            const isExtended = (tip, pip) => tip.y < pip.y;
            
            const indexUp = isExtended(landmarks[8], landmarks[6]);
            const middleUp = isExtended(landmarks[12], landmarks[10]);
            const ringUp = isExtended(landmarks[16], landmarks[14]);
            const pinkyUp = isExtended(landmarks[20], landmarks[18]);
            const thumbUp = landmarks[4].x < landmarks[3].x; // Crude check for open hand thumb

            let fingersUp = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;
            
            // Logic mapping
            let gesture = "";
            
            // ILY Sign (Thumb, Index, Pinky)
            if (indexUp && pinkyUp && !middleUp && !ringUp) {
                gesture = "i love you";
            } else if (fingersUp === 4 && indexUp && middleUp && ringUp && pinkyUp) {
                gesture = "EXPLODE";
            } else if (fingersUp === 1 && indexUp) {
                gesture = "halo sayang";
            } else if (fingersUp === 2 && indexUp && middleUp) {
                gesture = "apa kabarr?";
            }

            updateUI(gesture);
        }

        function updateUI(text) {
            if (text === "EXPLODE") {
                if (!isExploding) createFirework();
                text = ""; 
            }

            if (currentText !== text) {
                currentText = text;
                if (text === "") {
                    textEl.classList.remove('active');
                } else {
                    textEl.innerText = text;
                    textEl.classList.add('active');
                }
            }
        }

        /**
         * ANIMATION & EFFECTS
         */
        function createFirework() {
            isExploding = true;
            const origin = handParticles[9].position.clone();
            const color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
            
            const group = new THREE.Group();
            const count = CONFIG.fireworkCount;
            const pts = new Float32Array(count * 3);
            const vels = [];

            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = 0.05 + Math.random() * 0.15;
                
                vels.push(new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta) * speed,
                    Math.sin(phi) * Math.sin(theta) * speed,
                    Math.cos(phi) * speed
                ));
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
            const mat = new THREE.PointsMaterial({
                color: color,
                size: 0.06,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geo, mat);
            points.position.copy(origin);
            scene.add(points);

            fireworks.push({ points, vels, life: 1.0 });
            
            // Subtle camera shake
            const intensity = 0.1;
            camera.position.x += (Math.random() - 0.5) * intensity;
            camera.position.y += (Math.random() - 0.5) * intensity;

            setTimeout(() => { isExploding = false; }, 800);
        }

        function updateFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const f = fireworks[i];
                const posAttr = f.points.geometry.attributes.position;
                
                for (let j = 0; j < CONFIG.fireworkCount; j++) {
                    posAttr.array[j*3] += f.vels[j].x;
                    posAttr.array[j*3+1] += f.vels[j].y;
                    posAttr.array[j*3+2] += f.vels[j].z;
                    f.vels[j].y -= 0.002; // gravity
                }
                
                posAttr.needsUpdate = true;
                f.life -= 0.015;
                f.points.material.opacity = f.life;
                
                if (f.life <= 0) {
                    scene.remove(f.points);
                    fireworks.splice(i, 1);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Idle movement
            const time = Date.now() * 0.0005;
            particleSystem.rotation.y += 0.001;
            particleSystem.rotation.x += 0.0005;

            updateFireworks();
            composer.render();
        }

        /**
         * HAND TRACKING SETUP
         */
        async function initHandTracking() {
            video = document.getElementById('videoElement');
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    
                    landmarks.forEach((lm, i) => {
                        // Map 0-1 normalized to Three.js space
                        const targetX = (lm.x - 0.5) * -12;
                        const targetY = (lm.y - 0.5) * -8;
                        const targetZ = lm.z * -10;

                        handParticles[i].visible = true;
                        handParticles[i].position.x = THREE.MathUtils.lerp(handParticles[i].position.x, targetX, CONFIG.lerpFactor);
                        handParticles[i].position.y = THREE.MathUtils.lerp(handParticles[i].position.y, targetY, CONFIG.lerpFactor);
                        handParticles[i].position.z = THREE.MathUtils.lerp(handParticles[i].position.z, targetZ, CONFIG.lerpFactor);
                    });

                    processGestures(landmarks);
                } else {
                    handParticles.forEach(p => p.visible = false);
                    updateUI("");
                }
            });

            const cameraHelper = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 640,
                height: 480
            });

            cameraHelper.start().then(() => {
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.remove(), 1000);
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        initThree();
        animate();
        initHandTracking();
    </script>
</body>
</html>
