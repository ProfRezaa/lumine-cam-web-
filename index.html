<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Fast Load Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="https://unpkg.com/@mediapipe/hands/hands.js"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: white; font-family: -apple-system, sans-serif; }
        canvas#three-canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Kamera di Atas Tengah */
        #camera-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 135px; z-index: 100;
            border-radius: 15px; overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: #000; opacity: 0; transition: opacity 0.5s;
        }
        #camera-container.active { opacity: 1; }
        video#input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas#output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        #ui { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #status-text { font-size: 3rem; font-weight: bold; opacity: 0; transition: 0.3s; text-align: center; }
        #status-text.show { opacity: 1; transform: scale(1.1); }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spin { width: 30px; height: 30px; border: 3px solid #333; border-top-color: #fff; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spin"></div>
        <p>MEMUAT SENSOR (PASTIKAN INTERNET AKTIF)</p>
    </div>

    <canvas id="three-canvas"></canvas>

    <div id="camera-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="ui">
        <h1 id="status-text"></h1>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');

        // --- 1. THREE.JS (Scene & Particles) ---
        const scene = new THREE.Scene();
        const camera3d = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera3d));
        composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85));

        const geo = new THREE.BufferGeometry();
        const pCount = 1000;
        const posArr = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) posArr[i] = (Math.random()-0.5)*15;
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        const mat = new THREE.PointsMaterial({ size: 0.05, color: 0x00aaff, transparent: true, blending: THREE.AdditiveBlending });
        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera3d.position.z = 5;

        // --- 2. GESTURE DETECTION ---
        let handPos = { x: 0, y: 0, active: false };
        function showMsg(txt) {
            if(statusText.innerText === txt) return;
            statusText.innerText = txt;
            statusText.className = txt ? 'show' : '';
        }

        function onResults(results) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('camera-container').classList.add('active');
            
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, hand, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 2});
                
                handPos.active = true;
                handPos.x = (hand[9].x - 0.5) * -10;
                handPos.y = (hand[9].y - 0.5) * -8;

                const up = (i) => hand[i].y < hand[i-2].y;
                const count = [up(8), up(12), up(16), up(20)].filter(Boolean).length;

                if(count >= 4) showMsg("BOOM FIREWORK!");
                else if(count === 2) showMsg("Apa Kabar?");
                else if(count === 1) showMsg("Halo Sayang");
                else showMsg("");
            } else {
                handPos.active = false;
                showMsg("");
            }
        }

        // --- 3. START SENSORS ---
        const hands = new Hands({ locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        new Camera(videoElement, {
            onFrame: async () => await hands.send({image: videoElement}),
            width: 480, height: 360
        }).start();

        function animate() {
            requestAnimationFrame(animate);
            const p = points.geometry.attributes.position.array;
            for(let i=0; i<pCount; i++) {
                if(handPos.active) {
                    p[i*3] += (handPos.x - p[i*3]) * 0.05;
                    p[i*3+1] += (handPos.y - p[i*3+1]) * 0.05;
                } else {
                    p[i*3] += Math.sin(Date.now()*0.001 + i)*0.01;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
            composer.render();
        }
        animate();
    </script>
</body>
</html>
